<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" onclick="goHome()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <rect x="1" y="1" width="7" height="7" rx="2" fill="currentColor" opacity="0.85"/>
      <rect x="10" y="1" width="7" height="7" rx="2" fill="currentColor" opacity="0.4"/>
      <rect x="1" y="10" width="7" height="7" rx="2" fill="currentColor" opacity="0.4"/>
      <rect x="10" y="10" width="7" height="7" rx="2" fill="currentColor" opacity="0.85"/>
    </svg>
    QuizMaker
  </a>
  <div class="nav-right" id="navUser">
    <button class="btn btn-sm" onclick="showScreen('auth')">Sign in</button>
  </div>
</nav>

<div class="wrapper">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="hero">
      <h1>Create &amp; take quizzes</h1>
      <p class="muted">Build quizzes in minutes. Share with anyone. Get instant results.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" onclick="requireAuth('create')">+ Create quiz</button>
        <button class="btn" onclick="showScreen('list')">Browse quizzes</button>
      </div>
    </div>
    <div class="section-header">
      <h2 style="margin:0">Recent quizzes</h2>
      <button class="btn btn-sm" onclick="showScreen('list')">View all</button>
    </div>
    <div id="homeQuizList"></div>
  </div>

  <!-- AUTH -->
  <div class="screen" id="screen-auth">
    <div class="auth-wrap">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchAuthTab('login')">Sign in</div>
        <div class="tab" id="tab-register" onclick="switchAuthTab('register')">Register</div>
      </div>
      <div id="auth-login">
        <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username" /></div>
        <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" /></div>
        <div class="err-msg" id="loginErr"></div>
        <button class="btn btn-primary btn-block" onclick="doLogin()">Sign in</button>
        <div class="divider">or</div>
        <button class="btn btn-block" onclick="demoLogin()">Continue as Guest</button>
      </div>
      <div id="auth-register" style="display:none">
        <div class="field"><label>Username</label><input type="text" id="regUser" placeholder="Choose a username" /></div>
        <div class="field"><label>Password</label><input type="password" id="regPass" placeholder="Choose a password" /></div>
        <div class="err-msg" id="regErr"></div>
        <button class="btn btn-primary btn-block" onclick="doRegister()">Create account</button>
      </div>
    </div>
  </div>

  <!-- QUIZ LIST -->
  <div class="screen" id="screen-list">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-sm" onclick="goHome()">← Back</button>
        <h2 style="margin:0">All quizzes</h2>
      </div>
      <button class="btn btn-sm btn-primary" onclick="requireAuth('create')">+ Create</button>
    </div>
    <div id="allQuizList"></div>
  </div>

  <!-- CREATE QUIZ -->
  <div class="screen" id="screen-create">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn btn-sm" onclick="goHome()">← Back</button>
      <h2 style="margin:0">Create a quiz</h2>
    </div>
    <div class="field"><label>Quiz title *</label><input type="text" id="quizTitle" placeholder="e.g. World Geography Basics" /></div>
    <div class="field"><label>Description (optional)</label><input type="text" id="quizDesc" placeholder="A short description..." /></div>
    <div id="questionsList"></div>
    <button class="btn" onclick="addQuestion()" style="margin-bottom:1rem">+ Add question</button>
    <br/>
    <button class="btn btn-primary" onclick="saveQuiz()">Publish quiz</button>
    <div class="err-msg" id="createErr" style="margin-top:10px"></div>
    <div class="ok-msg" id="createOk" style="margin-top:10px"></div>
  </div>

  <!-- TAKE QUIZ -->
  <div class="screen" id="screen-take">
    <div id="takeContent"></div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div id="resultsContent"></div>
  </div>

</div>

<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/quizList.js"></script>
<script src="js/create.js"></script>
<script src="js/take.js"></script>
<script src="js/app.js"></script>
</body>
</html>
