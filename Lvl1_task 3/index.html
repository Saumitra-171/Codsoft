<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator">
        <div id="history-panel">
            <span id="history-label">HISTORY</span>
            <div id="history-list"></div>
        </div>

        <div id="display-area">
            <div id="expression"></div>
            <input id="display" readonly placeholder="0">
        </div>

        <div id="keys">
            <button onclick="clearDisplay()" class="fn-btn wide-btn">AC</button>
            <button onclick="backspace()" class="fn-btn">⌫</button>
            <button onclick="appendToDisplay('/')" class="operator-btn">/</button>

            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="operator-btn">×</button>

            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="operator-btn">−</button>

            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="operator-btn">+</button>

            <button onclick="toggleSign()" class="fn-btn">+/−</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" class="equals-btn">=</button>
        </div>

        <div id="keyboard-hint">⌨ keyboard supported</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
